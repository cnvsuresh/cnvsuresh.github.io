<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Export LinkedIn Banner as JPEG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1c; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding: 40px; text-align: center; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p.sub { color: #64748b; margin-bottom: 32px; font-size: 0.9rem; }
    .preview { max-width: 100%; border: 1px solid #1e293b; border-radius: 8px; margin: 0 auto 24px; overflow: hidden; }
    .preview svg { width: 100%; height: auto; display: block; }
    canvas { display: none; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; background: #3b82f6; color: #fff;
      border: none; border-radius: 999px; font-size: 1rem;
      font-weight: 600; cursor: pointer; transition: all 0.3s;
    }
    .btn:hover { background: #2563eb; transform: translateY(-2px); }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .years-control {
      text-align: left;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 16px 24px;
    }
    .years-control label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #94a3b8;
      display: block;
      margin-bottom: 4px;
    }
    .years-auto {
      font-size: 0.78rem;
      color: #10b981;
      display: block;
      margin-bottom: 8px;
    }
    .years-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .years-input-row input {
      width: 80px;
      padding: 8px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      text-align: center;
      outline: none;
    }
    .years-input-row input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .years-hint {
      font-size: 0.7rem;
      color: #475569;
    }
    .info { margin-top: 20px; color: #64748b; font-size: 0.82rem; }
  </style>
</head>

        <circle cx="38" cy="36" r="2" fill="#06b6d4" opacity="0.7"/>
      </g>
      <text x="890" y="125" font-family="'Inter','Segoe UI',sans-serif" font-weight="800" font-size="52" fill="url(#nameGr)">Suresh Gupta</text>
      <text x="890" y="152" font-family="'Inter','Segoe UI',sans-serif" font-weight="400" font-size="14" fill="#64748b" letter-spacing="1.5">Kotha C N Venkata Suresh Gupta</text>
      <text x="890" y="188" font-family="'Inter','Segoe UI',sans-serif" font-weight="500" font-size="16" fill="#94a3b8">Technical Project Manager  &amp;  Senior DevOps Engineer</text>

        <line x1="1400" y1="0" x2="1400" y2="396"/><line x1="1500" y1="0" x2="1500" y2="396"/><line x1="1300" y1="80" x2="1584" y2="80"/><line x1="1350" y1="198" x2="1584" y2="198"/><line x1="1300" y1="316" x2="1584" y2="316"/>

  </div>

  <div class="controls">
    <div class="years-control">
      <label>Years of Experience:</label>
      <span class="years-auto">Auto-calculated: <strong id="yearsDisplay">10</strong>+ years (from Oct 2015)</span>
      <div class="years-input-row">
        <input type="number" id="yearsInput" min="1" max="50" placeholder="Auto" />
        <span class="years-hint">Leave empty for auto, or type a custom number</span>
      </div>
    </div>
    <button class="btn" id="downloadBtn">Download as JPEG</button>
  </div>

  <p class="info">JPEG at 1584x396 (high quality 0.95). Upload to LinkedIn → Profile → Edit background photo.</p>

  <canvas id="canvas" width="1584" height="396"></canvas>

  <script>
    const CAREER_START = new Date(2015, 9);
    const careerYears = Math.floor((new Date() - CAREER_START) / (365.25 * 24 * 60 * 60 * 1000));

    function updateYearsInSvg(years) {
      const el = document.getElementById('subtitleLine');
      el.textContent = `Cloud-Native Automation  |  Kubernetes & Azure/AWS  |  Microservices Architect  |  ${years}+ Years`;
      document.getElementById('yearsDisplay').textContent = years;
    }

    updateYearsInSvg(careerYears);

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const customYears = document.getElementById('yearsInput').value;
      updateYearsInSvg(customYears || careerYears);

      const svgEl = document.getElementById('bannerSvg');
      const svgData = new XMLSerializer().serializeToString(svgEl);
      const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();

      img.onload = () => {
        ctx.fillStyle = '#070b14';
        ctx.fillRect(0, 0, 1584, 396);
        ctx.drawImage(img, 0, 0, 1584, 396);
        URL.revokeObjectURL(url);

        const link = document.createElement('a');
        link.download = 'suresh-gupta-linkedin-banner.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
      };

      img.src = url;
    });

    document.getElementById('yearsInput').addEventListener('input', (e) => {
      updateYearsInSvg(e.target.value || careerYears);
    });
  </script>
</body>
</html>
